name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Release quality gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --group dev --frozen

      - name: Run release quality gate
        run: uv run python scripts/check_project.py quality

  package:
    name: Build release artifacts
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install package validation tools
        run: uv sync --only-group package --frozen

      - name: Build and validate release artifacts
        run: uv run --only-group package python scripts/check_project.py package --tag "${{ github.ref_name }}" --dist-dir dist

      - name: Install and smoke-test wheel
        run: |
          uv venv .wheel-venv
          uv pip install --python .wheel-venv/bin/python dist/*.whl
          .wheel-venv/bin/python -c 'from importlib.metadata import version; from kohdalab_iv import __version__; assert __version__ == version("kohdalab-iv")'
          .wheel-venv/bin/kohdalab-iv --help

      - name: Store workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kohdalab-iv-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --draft --verify-tag --title "KohdaLab IV ${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
