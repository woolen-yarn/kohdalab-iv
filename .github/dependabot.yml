version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python-runtime:
        patterns:
          - "pyvisa"
          - "tomli"
          - "pyside6"
          - "pyqtgraph"
      python-notebook:
        patterns:
          - "ipython"
          - "matplotlib"
          - "jupyterlab"
      python-dev:
        patterns:
          - "pytest"
